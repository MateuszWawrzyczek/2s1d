repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: corepack pnpm exec prettier --write
        language: system
        types_or: [javascript, jsx, ts, tsx, json, css, markdown]
